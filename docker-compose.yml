version: '3'
services:
  postgres:
    image: 'postgres:11-alpine'
    ports:
      - 5433:5432
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: marble
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # docker-compose exec postgres psql -U postgres marble
    # INSERT INTO "User" (id, name, email, "createdAt", "updatedAt") VALUES ('1', 'Andy', 'me@andrewray.me', NOW(), NOW());
    # INSERT INTO "Role" no see below
    # const PrismaClient = require('@prisma/client').PrismaClient;
    # const client = new PrismaClient({ log: ['query'] });
    # client.role.create({ data: { role: 'admin' } }).catch(e => console.error(e));
    # SELECT Id from "User";
    # SELECT * from "Role";
    # client.roleAssignment.create({ data: { userId: "clzetcf6t0000v0lo1z5c7o1a", roleId: "clzetcwca0000v0oku0xi4aor", assignedBy: "clzetcf6t0000v0lo1z5c7o1a" } }).catch(e => console.error(e));

  prisma:
    image: prismagraphql/prisma:1.23
    depends_on:
      - postgres
    ports:
      - '4466:4466'
    environment:
      PRISMA_CONFIG: |
        port: 4466
        databases:
          default:
            connector: postgres
            host: host.docker.internal
            port: 5433
            database: marble
            schema: public
            user: postgres
            password: ${POSTGRES_PASSWORD}
            migrations: false
            ssl: false

volumes:
  postgres-data:
    driver: local
